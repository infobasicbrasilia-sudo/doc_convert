<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil IA Office</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="card">
        <img src="BSBiA.png" alt="Logo" class="logo-brasil">
        <h1>Brasil IA Office</h1>
        <p>Conversor de Documentos para PDF</p>

        <select id="formatSelect" class="select-box">
            <option value="docx">Word (.docx) ➔ PDF</option>
            <option value="xlsx">Excel (.xlsx) ➔ PDF</option>
            <option value="pptx">PowerPoint (.pptx) ➔ PDF</option>
        </select>

        <div class="drop-zone" id="dropZone" style="position: relative;">
            <span id="fileName">Clique para selecionar o arquivo</span>
            <input type="file" id="fileInput" accept=".docx,.xlsx,.pptx" 
                   style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
        </div>

        <button id="convertBtn" class="btn-convert" disabled>GERAR PDF AGORA</button>
        <div id="status" class="status-msg"></div>

        <div id="downloadArea" style="display: none;">
            <p style="color: #155724; margin: 10px 0; font-weight: bold;">✅ Documento Pronto!</p>
            <a id="fileLink" href="#" class="download-link" target="_blank">BAIXAR PDF</a>
        </div>
        
        <div style="margin-top: 25px; font-size: 0.75rem; color: #aaa;">
            <b>Instrutor Joner & Alunos 2026</b>
        </div>
        <div align=center><a href='https://contador.s12.com.br'><img src='https://contador.s12.com.br/img-2y8BBxyd9C9YZd58-3.gif' border='0' alt='counter free'></a><script type='text/javascript' src='https://contador.s12.com.br/ad.js?id=2y8BBxyd9C9YZd58'></script></div>
    </div>

    <script src="javascript/script.js"></script>
    
</body>
</html>
